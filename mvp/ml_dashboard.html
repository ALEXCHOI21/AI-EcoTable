<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-EcoTable | ML Insights Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary: #0284c7;
            --secondary: #e11d48;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #0284c7, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        .metric-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 500;
        }

        .chart-container {
            height: 300px;
            position: relative;
            margin-top: 15px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI-EcoTable 머신러닝 엔진 인사이트</h1>
        <div class="badge">Model: Random Forest Ensemble v1.2</div>
    </div>

    <div class="grid">
        <!-- 핵심 지표 카드 -->
        <div class="card">
            <div class="card-title">메뉴 분류 정확도 (F1-Score) <span class="badge">Performance</span></div>
            <div class="metric-value">0.948</div>
            <div class="metric-label">NLP 기반 잔반 카테고리화 정밀도</div>
            <div class="chart-container" style="height: 100px; margin-top: 20px;">
                <canvas id="f1Chart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-title">평균 절대 오차 (MAE) <span class="badge">Accuracy</span></div>
            <div class="metric-value">0.12<span style="font-size: 1rem; color: var(--text-muted);">kg</span></div>
            <div class="metric-label">식수 인원당 잔반 발생량 예측 오차</div>
            <div class="chart-container" style="height: 100px; margin-top: 20px;">
                <canvas id="maeChart"></canvas>
            </div>
        </div>

        <!-- 변수 중요도 차트 -->
        <div class="card" style="grid-column: span 2;">
            <div class="card-title">잔반 발생 영향 지수 (Feature Importance)</div>
            <div class="chart-container">
                <canvas id="importanceChart"></canvas>
            </div>
        </div>

        <!-- 탄소 저감 시뮬레이션 -->
        <div class="card">
            <div class="card-title">예상 탄소 저감량 (CO2eq)</div>
            <div class="metric-value" style="color: #4ade80;">-24.5%</div>
            <div class="metric-label">AI 최적 급식량 적용 시 연간 기대 효과</div>
            <div class="chart-container" style="height: 150px; margin-top: 10px;">
                <canvas id="ecoChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // F1-Score Mini Chart
        new Chart(document.getElementById('f1Chart'), {
            type: 'line',
            data: {
                labels: ['v0.1', 'v0.5', 'v1.0', 'v1.2'],
                datasets: [{
                    label: 'F1-Score',
                    data: [0.72, 0.85, 0.92, 0.948],
                    borderColor: '#0284c7',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(2, 132, 199, 0.1)',
                    pointBackgroundColor: '#ffffff',
                    pointBorderWidth: 2,
                    pointRadius: 4
                }]
            },
            options: { 
                plugins: { legend: { display: false } }, 
                scales: { 
                    x: { title: { display: true, text: '학습 단계 (Version)', font: { weight: 'bold' } }, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } }, 
                    y: { title: { display: true, text: '정밀도', font: { weight: 'bold' } }, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' }, min: 0.5, max: 1.0 } 
                } 
            }
        });

        // MAE Mini Chart
        new Chart(document.getElementById('maeChart'), {
            type: 'line',
            data: {
                labels: ['v0.1', 'v0.5', 'v1.0', 'v1.2'],
                datasets: [{
                    label: 'MAE',
                    data: [0.45, 0.32, 0.18, 0.12],
                    borderColor: '#e11d48',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(225, 29, 72, 0.1)',
                    pointBackgroundColor: '#ffffff',
                    pointBorderWidth: 2,
                    pointRadius: 4
                }]
            },
            options: { 
                plugins: { legend: { display: false } }, 
                scales: { 
                    x: { title: { display: true, text: '학습 단계 (Version)', font: { weight: 'bold' } }, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' } }, 
                    y: { title: { display: true, text: '오차 (kg)', font: { weight: 'bold' } }, grid: { color: '#f1f5f9' }, ticks: { color: '#64748b' }, min: 0 } 
                } 
            }
        });

        // Feature Importance Chart
        new Chart(document.getElementById('importanceChart'), {
            type: 'bar',
            data: {
                labels: ['메뉴 선호도', '학생 연령대', '날씨/기온', '요일 특성', '식수 인원', '조리 방식'],
                datasets: [{
                    label: '영향도 (%)',
                    data: [42, 18, 15, 12, 8, 5],
                    backgroundColor: 'rgba(2, 132, 199, 0.8)',
                    borderRadius: 8,
                    borderWidth: 0
                }]
            },
            options: {
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { 
                    x: { 
                        title: { display: true, text: '중요도 비중 (%)', font: { weight: 'bold' } },
                        grid: { color: '#f1f5f9' }, 
                        ticks: { color: '#64748b' } 
                    },
                    y: { 
                        grid: { display: false }, 
                        ticks: { color: '#0f172a', font: { weight: 'bold' } } 
                    }
                }
            }
        });

        // Eco Impact Chart
        new Chart(document.getElementById('ecoChart'), {
            type: 'doughnut',
            data: {
                labels: ['저감됨', '잔여량'],
                datasets: [{
                    data: [24.5, 75.5],
                    backgroundColor: ['#10b981', '#f1f5f9'],
                    borderWidth: 0
                }]
            },
            options: { 
                cutout: '80%', 
                plugins: { 
                    legend: { 
                        display: true, 
                        position: 'bottom',
                        labels: { boxWidth: 12, font: { weight: 'bold' } }
                    } 
                } 
            }
        });
    </script>
</body>
</html>
